name: Deploy Flask App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  ci:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        run: |
          python -m py_compile \
            db_connect.py \
            app.py \
            search_movies.py \
            1_create_table.py \
            2_insert_movie_info.py \
            3_create_normalized_tables.py \
            4_normalize_movie_data.py \
            5_create_index.py

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
      EC2_SERVICE_NAME: ${{ secrets.EC2_SERVICE_NAME }}

    steps:
      - name: Configure SSH
        run: |
          test -n "$EC2_HOST" || { echo "Missing GitHub Secret: EC2_HOST"; exit 1; }
          test -n "$EC2_USER" || { echo "Missing GitHub Secret: EC2_USER"; exit 1; }
          test -n "$EC2_SSH_KEY" || { echo "Missing GitHub Secret: EC2_SSH_KEY"; exit 1; }

          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          APP_DIR="${EC2_APP_DIR:-/home/ubuntu/kobis-movie-db}"
          SYSTEMD_SERVICE="${EC2_SERVICE_NAME:-kobis-movie-db}"

          ssh -i ~/.ssh/ec2_deploy_key "$EC2_USER@$EC2_HOST" \
            "APP_DIR='$APP_DIR' SYSTEMD_SERVICE='$SYSTEMD_SERVICE' DEPLOY_BRANCH='$DEPLOY_BRANCH' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd "$APP_DIR"

          git fetch origin "$DEPLOY_BRANCH"
          if git rev-parse --verify "$DEPLOY_BRANCH" >/dev/null 2>&1; then
            git checkout "$DEPLOY_BRANCH"
          else
            git checkout -b "$DEPLOY_BRANCH" "origin/$DEPLOY_BRANCH"
          fi
          git pull --ff-only origin "$DEPLOY_BRANCH"

          python3 -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt

          sudo systemctl restart "$SYSTEMD_SERVICE"
          sudo systemctl status "$SYSTEMD_SERVICE" --no-pager
          REMOTE_SCRIPT